<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>circle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body {
      -webkit-clip-path: circle(50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #1a1a2e;
      -webkit-app-region: drag;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #1f8ad1;
      border-radius: 50%;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stats {
      text-align: center;
      line-height: 1.5;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 12px;
      -webkit-app-region: no-drag;
    }
    .stats span { color: #1f8ad1; }
    .status {
      font-size: 11px;
      color: #888;
      font-family: monospace;
      -webkit-app-region: no-drag;
    }
  </style>
</head>
<body>
  <div class="spinner" id="spinner" style="animation: spin 1s linear infinite;"></div>
  <div class="stats">
    <div>Timer: <span id="timer">0s</span></div>
    <div>Requests: <span id="ok">0</span> / <span id="fail">0</span></div>
  </div>
  <div class="status" id="status">Starting...</div>
  <script type="module" src="/src/secondary.ts"></script>
</body>
</html>
