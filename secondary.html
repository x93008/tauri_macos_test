<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Worker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: monospace;
      -webkit-app-region: drag;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #1f8ad1;
      border-radius: 50%;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status { font-size: 14px; color: #888; }
    .stats { text-align: center; line-height: 1.6; }
    .stats span { color: #1f8ad1; font-weight: bold; }
    button {
      -webkit-app-region: no-drag;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="spinner" id="spinner" style="animation: spin 1s linear infinite;"></div>
  <div class="stats">
    <div>Timer: <span id="timer">0s</span></div>
    <div>Requests: <span id="ok">0</span> ok / <span id="fail">0</span> fail</div>
  </div>
  <div class="status" id="status">Starting...</div>
  <button id="stop-btn" style="display:none;">Stop</button>
  <script type="module" src="/src/secondary.ts"></script>
</body>
</html>
